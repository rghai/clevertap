<svg width="1200" height="800" viewBox="0 0 1200 800" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="800" rx="28" fill="#F8FAFC"/>
<text x="70" y="68" text-anchor="start" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#101828"><tspan x="70" dy="0">Google: keep anonymous scale native, then add</tspan><tspan x="70" dy="34">CleverTap where profile memory and business context matter</tspan></text>
<rect x="70" y="150" width="320" height="560" rx="22" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/><text x="98" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#101828"><tspan x="98" dy="0">1. As-is today</tspan></text><text x="98" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="98" dy="0">Google tags, remarketing and modeled</tspan><tspan x="98" dy="24">measurement already support anonymous demand.</tspan></text>
<rect x="100" y="240" width="260" height="72" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="230" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="230" dy="0">Google tag / Ads</tspan></text>
<path d="M230 312V366" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="100" y="366" width="260" height="72" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="230" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="230" dy="0">Anonymous audiences + modeling</tspan></text>
<path d="M230 438V492" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="100" y="492" width="260" height="72" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="230" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="230" dy="0">Remarketing + measurement</tspan></text>
<text x="100" y="620" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="100" dy="0">Strong for anonymous acquisition.</tspan><tspan x="100" dy="24">Still weaker on DHL-specific business context.</tspan></text>

<rect x="440" y="150" width="320" height="560" rx="22" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/><text x="468" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#101828"><tspan x="468" dy="0">2. With CleverTap</tspan></text><text x="468" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="468" dy="0">Native integration is identified-user</tspan><tspan x="468" dy="24">activation, not anonymous visitor export.</tspan></text>
<rect x="470" y="240" width="260" height="72" rx="18" fill="#FFF1F2" stroke="#F0C7CB"/><text x="600" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#D40511"><tspan x="600" dy="0">Known-user segments</tspan></text>
<path d="M600 312V366" stroke="#D40511" stroke-width="4" stroke-linecap="round"/>
<rect x="470" y="366" width="260" height="72" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="600" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="600" dy="0">Google Ads audience lists</tspan></text>
<path d="M600 438V492" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="470" y="492" width="260" height="72" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="600" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="600" dy="0">Higher-value activation</tspan></text>
<text x="470" y="620" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="470" dy="0">Best once identity exists and DHL wants to</tspan><tspan x="470" dy="24">treat higher-value known users differently.</tspan></text>

<rect x="810" y="150" width="320" height="560" rx="22" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/><text x="838" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#101828"><tspan x="838" dy="0">3. Advanced path</tspan></text><text x="838" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="838" dy="0">Use Google's own conversion endpoints to</tspan><tspan x="838" dy="24">connect paid clicks to later business outcomes.</tspan></text>
<rect x="840" y="240" width="260" height="72" rx="18" fill="#FFF8E1" stroke="#F2E3B0"/><text x="970" y="283" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7A5B00"><tspan x="970" dy="0">Enhanced conversions</tspan></text>
<path d="M970 312V366" stroke="#7A5B00" stroke-width="4" stroke-linecap="round"/>
<rect x="840" y="366" width="260" height="72" rx="18" fill="#FFF8E1" stroke="#F2E3B0"/><text x="970" y="409" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7A5B00"><tspan x="970" dy="0">Offline conversion imports</tspan></text>
<path d="M970 438V492" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="840" y="492" width="260" height="72" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="970" y="535" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="970" dy="0">Outcome linkage back to ads</tspan></text>
<text x="840" y="620" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="840" dy="0">Most valuable when DHL's service or revenue</tspan><tspan x="840" dy="24">outcome happens after the first online action.</tspan></text>
<text x="600" y="756" text-anchor="middle" font-family="Arial, sans-serif" font-size="18" font-weight="700" fill="#25324B"><tspan x="600" dy="0">Keep anonymous acquisition native. Use CleverTap where profile memory and commercial logic matter most.</tspan></text>
</svg>