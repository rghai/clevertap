<rect x="102" y="220" width="236" height="86" rx="18" fill="#EEF8F2" stroke="#CDE9D7"/><text x="220" y="254" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#00A341"><tspan x="220" dy="0">LINE Official Account</tspan><tspan x="220" dy="24">Customer messaging support</tspan></text>
