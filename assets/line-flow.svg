<svg width="1200" height="900" viewBox="0 0 1200 900" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="900" rx="28" fill="#F8FAFC"/>
<text x="70" y="68" text-anchor="start" font-family="Arial, sans-serif" font-size="27" font-weight="700" fill="#101828"><tspan x="70" dy="0">LINE: from support inbox to identity, service and</tspan><tspan x="70" dy="34">engagement operating channel</tspan></text>
