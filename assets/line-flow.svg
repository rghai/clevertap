<rect x="102" y="362" width="236" height="92" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="220" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="220" dy="0">Tracking / pickup / reschedule</tspan><tspan x="220" dy="24">Valuable intent, often trapped in chat</tspan></text>
<text x="102" y="520" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="102" dy="0">Strong reach.</tspan><tspan x="102" dy="32">Weak profile linkage.</tspan><tspan x="102" dy="32">Limited commercial memory.</tspan></text>

<rect x="410" y="150" width="380" height="650" rx="22" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/><text x="438" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#101828"><tspan x="438" dy="0">2. No-heavy-middleware progression</tspan></text><text x="438" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"></text>
<rect x="442" y="220" width="316" height="74" rx="18" fill="#EEF8F2" stroke="#CDE9D7"/><text x="600" y="264" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#00A341"><tspan x="600" dy="0">LINE rich menu / message CTA</tspan></text>
