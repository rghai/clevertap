<rect x="442" y="464" width="316" height="82" rx="18" fill="#FFF1F2" stroke="#F0C7CB"/><text x="600" y="500" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#D40511"><tspan x="600" dy="0">Capture LINE UID + service intent</tspan><tspan x="600" dy="24">Tracking ID, shipment ref, flow completion</tspan></text>
