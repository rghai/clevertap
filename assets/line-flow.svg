<rect x="862" y="362" width="236" height="92" rx="18" fill="#FFF1F2" stroke="#F0C7CB"/><text x="980" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#D40511"><tspan x="980" dy="0">Update CleverTap + systems</tspan><tspan x="980" dy="24">Shipment and profile enrichment</tspan></text>
<path d="M980 454V510" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="862" y="510" width="236" height="92" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="980" y="546" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="980" dy="0">Agent assist + automation</tspan><tspan x="980" dy="24">True two-way service channel</tspan></text>
<text x="862" y="676" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="862" dy="0">Highest upside, but requires deliberate</tspan><tspan x="862" dy="24">middleware and identity design.</tspan></text>
