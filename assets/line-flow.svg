<text x="442" y="724" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="442" dy="0">Best for structured journeys without full chat ingestion.</tspan></text>

<rect x="830" y="150" width="300" height="650" rx="22" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/><text x="858" y="192" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#101828"><tspan x="858" dy="0">3. Smart bot server</tspan></text><text x="858" y="230" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"></text>
