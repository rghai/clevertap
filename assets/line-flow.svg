<rect x="442" y="342" width="316" height="74" rx="18" fill="#FFF8E1" stroke="#F2E3B0"/><text x="600" y="386" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7A5B00"><tspan x="600" dy="0">LIFF or LINE Login flow</tspan></text>
