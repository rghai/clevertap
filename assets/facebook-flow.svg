<svg width="1200" height="760" viewBox="0 0 1200 760" fill="none" xmlns="http://www.w3.org/2000/svg">
<rect width="1200" height="760" rx="28" fill="#F8FAFC"/>
<text x="70" y="70" text-anchor="start" font-family="Arial, sans-serif" font-size="28" font-weight="700" fill="#101828"><tspan x="70" dy="0">Meta: from fragmented signal to stronger</tspan><tspan x="70" dy="34">audience and event intelligence</tspan></text>
<rect x="70" y="142" width="320" height="520" rx="22" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/><text x="98" y="184" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#101828"><tspan x="98" dy="0">1. As-is today</tspan></text><text x="98" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"></text>
<rect x="100" y="198" width="260" height="70" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="230" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="230" dy="0">Website + Pixel</tspan></text>
<path d="M230 268V320" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="100" y="320" width="260" height="70" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="230" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="230" dy="0">Meta matching</tspan></text>
<path d="M230 390V442" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="100" y="442" width="260" height="70" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="230" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="230" dy="0">Retargeting / reporting</tspan></text>
<text x="100" y="570" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="100" dy="0">Useful, but weaker when identity is incomplete</tspan><tspan x="100" dy="24">or marketing consent is limited.</tspan></text>

<rect x="440" y="142" width="320" height="520" rx="22" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/><text x="468" y="184" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#101828"><tspan x="468" dy="0">2. With CleverTap</tspan></text><text x="468" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"></text>
<rect x="470" y="198" width="260" height="70" rx="18" fill="#FFF1F2" stroke="#F0C7CB"/><text x="600" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#D40511"><tspan x="600" dy="0">Behavioral segments</tspan></text>
<path d="M600 268V320" stroke="#D40511" stroke-width="4" stroke-linecap="round"/>
<rect x="470" y="320" width="260" height="70" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="600" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="600" dy="0">Facebook Custom Audiences</tspan></text>
<path d="M600 390V442" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="470" y="442" width="260" height="70" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="600" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="600" dy="0">Sharper re-engagement</tspan></text>
<text x="470" y="570" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="470" dy="0">CleverTap decides which audience pockets are</tspan><tspan x="470" dy="24">commercially worth treating differently.</tspan></text>

<rect x="810" y="142" width="320" height="520" rx="22" fill="#FFFFFF" stroke="#E4E7EC" stroke-width="2"/><text x="838" y="184" text-anchor="start" font-family="Arial, sans-serif" font-size="22" font-weight="700" fill="#101828"><tspan x="838" dy="0">3. Advanced path</tspan></text><text x="838" y="222" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"></text>
<rect x="840" y="198" width="260" height="70" rx="18" fill="#FFF8E1" stroke="#F2E3B0"/><text x="970" y="240" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#7A5B00"><tspan x="970" dy="0">CleverTap event logic</tspan></text>
<path d="M970 268V320" stroke="#7A5B00" stroke-width="4" stroke-linecap="round"/>
<rect x="840" y="320" width="260" height="70" rx="18" fill="#FFF1F2" stroke="#F0C7CB"/><text x="970" y="362" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#D40511"><tspan x="970" dy="0">Meta Conversions API</tspan></text>
<path d="M970 390V442" stroke="#B3B8C2" stroke-width="4" stroke-linecap="round"/>
<rect x="840" y="442" width="260" height="70" rx="18" fill="#F7F9FC" stroke="#E4E7EC"/><text x="970" y="484" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" font-weight="700" fill="#101828"><tspan x="970" dy="0">Stronger optimization signal</tspan></text>
<text x="840" y="570" text-anchor="start" font-family="Arial, sans-serif" font-size="16" font-weight="400" fill="#475467"><tspan x="840" dy="0">Best added where stronger attribution or bidding</tspan><tspan x="840" dy="24">signal clearly justifies the extra effort.</tspan></text>
</svg>